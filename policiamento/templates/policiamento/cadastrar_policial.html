<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Policiais</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="container mx-auto max-w-4xl">
        <div class="flex justify-between items-center mb-6 bg-blue-900 p-4 rounded text-white shadow">
            <h1 class="text-xl font-bold">CADASTRO DE MILITARES - DELEGADA</h1>
            <a href="{% url 'painel_escala' %}" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded text-sm font-semibold">Voltar ao Painel</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <form method="POST" class="bg-white p-4 rounded shadow md:col-span-1">
                {% csrf_token %}
                <h2 class="font-bold text-gray-700 mb-4 border-b pb-1">Novo Militar</h2>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">Nome de Guerra</label>
                    <input type="text" name="nome_guerra" placeholder="Ex: Cb José" required class="w-full border p-2 rounded outline-none focus:border-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">Categoria de Custo</label>
                    <select name="categoria" required class="w-full border p-2 rounded outline-none focus:border-blue-500">
                        {% for valor, label in categorias %}
                            <option value="{{ valor }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded">Salvar Militar</button>
            </form>

            <div class="bg-white p-4 rounded shadow md:col-span-2">
                <h2 class="font-bold text-gray-700 mb-4 border-b pb-1">Efetivo Cadastrado</h2>
                <ul class="divide-y text-sm">
                    {% for pm in policiais %}
                    <li class="py-2 flex justify-between">
                        <span class="font-semibold text-gray-800">{{ pm.nome_guerra }}</span>
                        <span class="bg-gray-200 text-gray-700 px-2 py-0.5 rounded text-xs">{{ pm.get_categoria_display }}</span>
                    </li>
                    {% empty %}
                    <li class="py-4 text-center text-gray-400">Nenhum policial cadastrado.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
